name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see. Strong proposals include a clear problem statement and a suggested approach.

  - type: input
    id: project
    attributes:
      label: Project
      description: Which repository does this relate to?
      placeholder: e.g., solace-gemma4good
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why is it needed?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your suggested approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you evaluate?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: |
        Add any relevant references:
        - Papers or articles
        - Similar implementations
        - Mockups or diagrams
